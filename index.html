<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Calculadora de Fluxo de Pagamento — Escalar</title>
<style>
  :root{
    --ink:#12172B;
    --paper:#F5F3ED;
    --gold:#C89B3C;
    --line:rgba(245,243,237,0.14);
    --green:#7FB88E;
    --red:#D9836B;
    --sub:rgba(245,243,237,0.55);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;
    min-height:100vh;
    padding:32px 18px;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
  }
  .eyebrow{
    font-family:'SF Mono',Consolas,'Courier New',monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }
  h1{
    font-family:Georgia,'Times New Roman',serif;
    font-weight:600;
    font-size:28px;
    margin:0 0 6px 0;
    letter-spacing:-0.01em;
  }
  .sub{
    color:var(--sub);
    font-size:13px;
    margin-bottom:28px;
    line-height:1.5;
  }
  .panel{
    background:rgba(245,243,237,0.03);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px;
    margin-bottom:20px;
  }
  .row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }
  .field{
    flex:1;
    min-width:150px;
  }
  label{
    display:block;
    font-size:12px;
    color:var(--sub);
    margin-bottom:7px;
    font-family:'SF Mono',Consolas,monospace;
  }
  input[type=text], input[type=date]{
    width:100%;
    background:rgba(245,243,237,0.06);
    border:1px solid var(--line);
    border-radius:6px;
    padding:12px 12px;
    color:var(--paper);
    font-family:'SF Mono',Consolas,monospace;
    font-size:16px;
    outline:none;
    -webkit-appearance:none;
    appearance:none;
  }
  input:focus{border-color:var(--gold);}

  table{
    width:100%;
    border-collapse:collapse;
    font-family:'SF Mono',Consolas,monospace;
    font-size:14px;
  }
  th{
    text-align:left;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:500;
    padding:0 0 10px 0;
    border-bottom:1px solid var(--line);
  }
  th:last-child, td:last-child{text-align:right;}
  td{
    padding:12px 0;
    border-bottom:1px dashed var(--line);
  }
  tr:last-child td{border-bottom:none;}
  .month-name{color:var(--paper); text-transform:capitalize;}
  .tag{
    display:inline-block;
    font-size:10px;
    letter-spacing:0.02em;
    padding:2px 7px;
    border-radius:20px;
    margin-left:6px;
    text-transform:uppercase;
  }
  .tag-entrada{background:rgba(200,155,60,0.15); color:var(--gold);}
  .tag-residual{background:rgba(127,184,142,0.15); color:var(--green);}
  .tag-credito{background:rgba(217,131,107,0.15); color:var(--red);}
  .tag-cheia{background:rgba(245,243,237,0.08); color:var(--sub);}
  .value{font-size:14px; font-weight:600;}
  .note{
    font-size:12px;
    color:var(--sub);
    line-height:1.6;
    margin-top:16px;
    padding-top:16px;
    border-top:1px solid var(--line);
  }
  .footer-note{
    font-size:11px;
    color:var(--sub);
    text-align:center;
    margin-top:24px;
    font-family:'SF Mono',Consolas,monospace;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Grupo Escalar · Comercial</div>
  <h1>Calculadora de fluxo de pagamento</h1>
  <div class="sub">Entrada de 50% com vencimento em início + 5 dias, residual pós-serviço e mensalidade cheia a partir da estabilização do ciclo.</div>

  <div class="panel">
    <div class="row">
      <div class="field">
        <label>Valor do contrato</label>
        <input type="text" id="valor" value="6.600,00" inputmode="decimal">
      </div>
      <div class="field">
        <label>Data de início</label>
        <input type="date" id="dataInicio" value="2026-08-17">
      </div>
    </div>
  </div>

  <div class="panel">
    <table>
      <thead><tr><th>Mês</th><th>Valor</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="note" id="calcNote"></div>
  </div>

  <div class="footer-note">taxa diária considerando mês comercial de 30 dias</div>
</div>

<script>
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

function parseValor(str){
  if(!str) return 0;
  const clean = str.replace(/\./g,'').replace(',','.');
  return parseFloat(clean) || 0;
}
function fmt(n){
  return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function addMonths(y, m, n){
  const total = m + n;
  const newY = y + Math.floor(total / 12);
  const newM = ((total % 12) + 12) % 12;
  return {y: newY, m: newM};
}
function monthLabel(y, m){
  return MESES[m] + '/' + y;
}

function calculate(){
  try{
    const valorMensal = parseValor(document.getElementById('valor').value);
    const dataStr = document.getElementById('dataInicio').value;
    const tbody = document.getElementById('tableBody');
    const note = document.getElementById('calcNote');

    if(!dataStr || !valorMensal){
      tbody.innerHTML = '';
      note.textContent = 'Preencha o valor do contrato e a data de início.';
      return;
    }

    const start = new Date(dataStr + 'T00:00:00');
    const D = start.getDate();
    const startY = start.getFullYear();
    const startM = start.getMonth();

    const dias1 = 30 - D + 1;
    const dailyRate = valorMensal / 30;
    const service1 = dias1 * dailyRate;
    const entry = valorMensal * 0.5;
    const credit = Math.max(0, entry - service1);

    const entryDate = new Date(start);
    entryDate.setDate(entryDate.getDate() + 5);
    const sameMonth = (entryDate.getFullYear() === startY && entryDate.getMonth() === startM);

    const rows = [];
    const slot0 = addMonths(startY, startM, 0);
    const slot1 = addMonths(startY, startM, 1);
    const slot2 = addMonths(startY, startM, 2);
    const slot3 = addMonths(startY, startM, 3);
    const slot4 = addMonths(startY, startM, 4);

    if(sameMonth){
      rows.push({...slot0, value: entry, tag: 'entrada', tagLabel: 'Entrada'});
      const residual = service1 - entry;
      rows.push({...slot1, value: residual, tag: residual >= 0 ? 'residual' : 'credito', tagLabel: residual >= 0 ? 'Residual' : 'Residual (crédito)'});
    } else {
      rows.push({...slot0, value: 0, tag: 'cheia', tagLabel: '—'});
      rows.push({...slot1, value: entry, tag: 'entrada', tagLabel: 'Entrada'});
    }
    rows.push({...slot2, value: valorMensal - credit, tag: credit > 0 ? 'credito' : 'cheia', tagLabel: credit > 0 ? 'Cheia − crédito' : 'Cheia'});
    rows.push({...slot3, value: valorMensal, tag: 'cheia', tagLabel: 'Cheia'});
    rows.push({...slot4, value: valorMensal, tag: 'cheia', tagLabel: 'Cheia'});

    tbody.innerHTML = rows.map(r => `
      <tr>
        <td class="month-name">${monthLabel(r.y, r.m)}<span class="tag tag-${r.tag}">${r.tagLabel}</span></td>
        <td class="value">R$ ${fmt(r.value)}</td>
      </tr>
    `).join('');

    const entryDueStr = entryDate.toLocaleDateString('pt-BR');
    let noteText = `Dias prestados no mês de início: ${dias1} (base comercial 30). Vencimento da entrada (início + 5 dias): ${entryDueStr} — `;
    noteText += sameMonth ? 'cai no mesmo mês do início.' : 'cai no mês seguinte ao início.';
    if(credit > 0){
      noteText += ` Entrada superou o valor do período em R$ ${fmt(credit)}, abatido na mensalidade cheia seguinte.`;
    }
    note.textContent = noteText;
  } catch(err){
    document.getElementById('calcNote').textContent = 'Erro ao calcular: ' + err.message;
  }
}

const valorInput = document.getElementById('valor');
const dataInput = document.getElementById('dataInicio');
valorInput.addEventListener('input', calculate);
valorInput.addEventListener('change', calculate);
dataInput.addEventListener('input', calculate);
dataInput.addEventListener('change', calculate);

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', calculate);
} else {
  calculate();
}
</script>
</body>
</html>
